name: Scrape Lotteries

on:
#  schedule:
#    # Run every 12 hours (at 00:00 and 12:00 UTC)
#    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history

      - name: Pull Latest Changes
        run: git pull origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Scraper
        run: python skills/scrape-dira/scrape_dira.py

      - name: Build Site Data
        run: python skills/scrape-dira/build_site_data.py

      - name: Commit and Push Changes
        id: push_step
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dira.sqlite webapp/data.json
          if git diff --quiet && git diff --staged --quiet; then
            echo "pushed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Auto-update lottery data"
            git push
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Pages
        if: steps.push_step.outputs.pushed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        if: steps.push_step.outputs.pushed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './webapp'

      - name: Deploy to GitHub Pages
        if: steps.push_step.outputs.pushed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
